{% extends "admin/challenges/update.html" %}

{% block type %}
<h5 class="mt-3">CTFLab Settings</h5>

<div class="form-group mb-3">
  <label for="docker_image">Docker Image</label>
  <input type="text" class="form-control" id="docker_image" name="docker_image" value="{{ challenge.docker_image }}">
</div>

<div class="form-group mb-3">
  <label for="flag_prefix">Flag Prefix</label>
  <input type="text" class="form-control" id="flag_prefix" name="flag_prefix" value="{{ challenge.flag_prefix }}">
</div>

<div class="form-group mb-3">
  <label for="instance_timeout">Instance Timeout (seconds)</label>
  <input type="number" class="form-control" id="instance_timeout" name="instance_timeout" value="{{ challenge.instance_timeout }}">
</div>

<div class="form-group mb-3">
  <label for="box_env_json">Environment Variables (JSON)</label>
  <textarea class="form-control" id="box_env_json" name="box_env_json" rows="2">{{ challenge.box_env_json }}</textarea>
</div>
{% endblock %}
