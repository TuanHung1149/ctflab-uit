{% extends "challenge.html" %}

{% block description %}
{{ challenge.html }}

<input type="hidden" id="ctflab-docker-image" value="{{ challenge.docker_image }}">

<div class="card mt-3 mb-3" style="border: 1px solid #444; background: #2d2d2d;">
  <div class="card-header" style="background: #1a1a2e; color: #0ff; border-bottom: 1px solid #444;">
    <i class="fas fa-server"></i> <strong>Lab Instance</strong>
  </div>
  <div class="card-body" id="instance-panel">
    <div id="instance-status">
      <p class="text-muted"><i class="fas fa-spinner fa-spin"></i> Loading instance status...</p>
    </div>
    <div id="instance-actions" class="mt-2" style="display:none;"></div>
  </div>
</div>
{% endblock %}
