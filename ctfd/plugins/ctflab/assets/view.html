<script id="ctflab-challenge-view" type="text/x-template">
<div class="ctflab-challenge">
  <div class="challenge-desc">{{{ challenge.description }}}</div>

  <input type="hidden" id="ctflab-docker-image" value="{{ challenge.docker_image }}">

  <div class="ctflab-instance-panel mt-3 p-3 border rounded" id="instance-panel">
    <h5><i class="fas fa-server"></i> Lab Instance</h5>
    <div id="instance-status">
      <p class="text-muted">Loading instance status...</p>
    </div>
    <div id="instance-actions" class="mt-2" style="display:none;">
      <!-- Buttons injected by view.js -->
    </div>
  </div>

  <div class="mt-3">
    <div class="input-group">
      <input type="text" class="form-control" id="challenge-input" placeholder="Enter flag...">
      <button class="btn btn-outline-success" id="challenge-submit">
        <i class="fas fa-flag"></i> Submit
      </button>
    </div>
    <div id="result-message" class="mt-2"></div>
    <div id="result-notification" class="mt-2"></div>
  </div>
</div>
</script>
