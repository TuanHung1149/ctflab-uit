{% extends "admin/challenges/create.html" %}

{% block type %}
<h5 class="mt-3">CTFLab Settings</h5>

<div class="form-group mb-3">
  <label for="docker_image">Docker Image<small class="form-text text-muted">e.g. ctflab/infinity</small></label>
  <input type="text" class="form-control" id="docker_image" name="docker_image" placeholder="ctflab/infinity" required>
</div>

<div class="form-group mb-3">
  <label for="flag_prefix">Flag Prefix<small class="form-text text-muted">e.g. NBL01</small></label>
  <input type="text" class="form-control" id="flag_prefix" name="flag_prefix" placeholder="NBL01" required>
</div>

<div class="form-group mb-3">
  <label for="instance_timeout">Instance Timeout (seconds)</label>
  <input type="number" class="form-control" id="instance_timeout" name="instance_timeout" value="14400" min="300">
</div>

<div class="form-group mb-3">
  <label for="box_env_json">Environment Variables (JSON)</label>
  <textarea class="form-control" id="box_env_json" name="box_env_json" rows="2">{}</textarea>
</div>
{% endblock %}
