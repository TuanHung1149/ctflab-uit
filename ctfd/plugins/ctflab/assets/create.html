<script id="ctflab-challenge-create" type="text/x-template">
<form id="challenge-create-form" method="POST">
  <div class="form-group mb-3">
    <label for="name">Name</label>
    <input type="text" class="form-control" id="name" name="name" placeholder="Challenge name" required>
  </div>

  <div class="form-group mb-3">
    <label for="category">Category</label>
    <input type="text" class="form-control" id="category" name="category" placeholder="Category">
  </div>

  <div class="form-group mb-3">
    <label for="description">Description</label>
    <textarea class="form-control" id="description" name="description" rows="5"
              placeholder="Challenge description (Markdown supported)"></textarea>
  </div>

  <div class="form-group mb-3">
    <label for="value">Value (points)</label>
    <input type="number" class="form-control" id="value" name="value" value="500">
  </div>

  <div class="form-group mb-3">
    <label for="state">State</label>
    <select class="form-control" id="state" name="state">
      <option value="visible" selected>Visible</option>
      <option value="hidden">Hidden</option>
    </select>
  </div>

  <hr>
  <h5>CTFLab Settings</h5>

  <div class="form-group mb-3">
    <label for="docker_image">Docker Image</label>
    <input type="text" class="form-control" id="docker_image" name="docker_image"
           placeholder="e.g. ctflab/infinity" required>
    <small class="form-text text-muted">
      The Docker image to run for each user's lab instance.
      Challenges with the same image share one container per user.
    </small>
  </div>

  <div class="form-group mb-3">
    <label for="flag_prefix">Flag Prefix</label>
    <input type="text" class="form-control" id="flag_prefix" name="flag_prefix"
           placeholder="e.g. NBL01" required>
    <small class="form-text text-muted">
      The flag prefix for this challenge (e.g., NBL01). Must match a key in the box's flag generation.
    </small>
  </div>

  <div class="form-group mb-3">
    <label for="instance_timeout">Instance Timeout (seconds)</label>
    <input type="number" class="form-control" id="instance_timeout" name="instance_timeout"
           value="14400" min="300" max="86400">
    <small class="form-text text-muted">
      How long the instance stays alive (default: 14400 = 4 hours).
    </small>
  </div>

  <div class="form-group mb-3">
    <label for="box_env_json">Environment Variables (JSON)</label>
    <textarea class="form-control" id="box_env_json" name="box_env_json" rows="3"
              placeholder='{"KEY": "value"}'>{}</textarea>
    <small class="form-text text-muted">
      Additional environment variables passed to the container as JSON.
    </small>
  </div>

  <input type="hidden" name="type" value="ctflab">
</form>
</script>
