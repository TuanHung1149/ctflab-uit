services:
  ctfd:
    build: ./ctfd
    ports:
      - "8080:8000"
    pid: "host"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    environment:
      - DATABASE_URL=mysql+pymysql://ctfd:${MYSQL_PASSWORD:-ctfd}@db/ctfd
      - REDIS_URL=redis://cache:6379
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - UPLOAD_FOLDER=/var/uploads
      - LOG_FOLDER=/var/log/CTFd
      - REVERSE_PROXY=true
      - OVPN_SERVER_IP=${OVPN_SERVER_IP:-152.42.233.178}
    volumes:
      - ctfd_uploads:/var/uploads
      - ctfd_logs:/var/log/CTFd
      - /var/run/docker.sock:/var/run/docker.sock
      - ./boxes:/boxes:ro
      - ./scripts:/scripts:ro
      - ./vpn-configs:/vpn-configs
      - /etc/openvpn:/etc/openvpn
      - ./fix-vpn-routing.sh:/opt/ctflab-uit/fix-vpn-routing.sh:ro
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-ctfd}
      - MYSQL_USER=ctfd
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-ctfd}
      - MYSQL_DATABASE=ctfd
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  ctfd_uploads:
  ctfd_logs:
  db_data:
  cache_data:
