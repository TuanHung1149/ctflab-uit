server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    return 301 http://__BASE_DOMAIN__$request_uri;
}

server {
    listen 80;
    listen [::]:80;

    server_name __BASE_DOMAIN__ __TXT_SUBDOMAIN__.__BASE_DOMAIN__;

    root /var/www/html;
    index index.html;
}

server {
    listen 80;
    listen [::]:80;

    server_name __FILE_SUBDOMAIN__.__BASE_DOMAIN__;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
