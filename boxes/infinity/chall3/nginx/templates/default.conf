server {

    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    return 301 http://infinity.insec$request_uri;
}

server {

    listen 80;
    listen [::]:80;

    server_name infinity.insec;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}